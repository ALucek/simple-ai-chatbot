# ---- multi-line block comments ----
---
id: multiline-comment-go
language: go
severity: error
message: multi-line comment — split into one-line comments or shorten
rule:
  all:
    - { kind: comment, regex: "\n" }
    - not: { regex: 'lint-ignore-comment' }

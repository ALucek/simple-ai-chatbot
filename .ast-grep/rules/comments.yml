# Comment char-cap (<=80) + no multi-line block comments, across all languages.

# ---- char cap (comment text > 80) ----
id: comment-too-long-go
language: go
severity: error
message: comment too long (>80) — keep it one short line
rule:
  all:
    - { kind: comment, regex: '^.{81,}$' }
    - not: { regex: 'https?://' }
    - not: { regex: 'lint-ignore-comment' }
    - not: { regex: '^//(go:|nolint|export)' }
---
id: comment-too-long-typescript

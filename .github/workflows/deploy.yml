name: deploy
on:
  workflow_run:
    workflows: [test]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    # Deploy only when tests passed on a push to main (never on PR / fork runs).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.diff.outputs.api }}
      web: ${{ steps.diff.outputs.web }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      # main only takes squash-merged PRs, so each push is one commit — HEAD^ is the prior main tip.
      - name: Detect changed services
        id: diff
        run: |
          changed=$(git diff --name-only HEAD^ HEAD)
          echo "$changed"
          api=false
          web=false
          if grep -qE '^api/' <<<"$changed"; then api=true; fi
          if grep -qE '^web/' <<<"$changed"; then web=true; fi
          echo "api=$api" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"

  deploy:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # WIF auth to GCP
      attestations: write # sign build provenance + SBOM
    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/chat
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push api
        id: build_api
        if: needs.changes.outputs.api == 'true'
        run: |
          docker build -t "$REGISTRY/api:$IMAGE_TAG" ./api
          docker push "$REGISTRY/api:$IMAGE_TAG"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$REGISTRY/api:$IMAGE_TAG" | cut -d@ -f2)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Build and push web
        id: build_web
        if: needs.changes.outputs.web == 'true'
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://${{ vars.DOMAIN }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}" \
            -t "$REGISTRY/web:$IMAGE_TAG" ./web
          docker push "$REGISTRY/web:$IMAGE_TAG"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$REGISTRY/web:$IMAGE_TAG" | cut -d@ -f2)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Run migrations
        if: needs.changes.outputs.api == 'true'
        run: |
          gcloud run jobs update chat-migrate \
            --image "$REGISTRY/api:$IMAGE_TAG" --region "${{ vars.GCP_REGION }}"
          gcloud run jobs execute chat-migrate --region "${{ vars.GCP_REGION }}" --wait
      - name: Deploy api
        if: needs.changes.outputs.api == 'true'
        run: |
          gcloud run services update chat-api \
            --image "$REGISTRY/api:$IMAGE_TAG" --region "${{ vars.GCP_REGION }}"
      - name: Deploy web
        if: needs.changes.outputs.web == 'true'
        run: |
          gcloud run services update chat-web \
            --image "$REGISTRY/web:$IMAGE_TAG" --region "${{ vars.GCP_REGION }}"
      - name: Smoke check
        run: |
          set -euo pipefail
          web=$(curl -fsS -o /dev/null -w '%{http_code}' "https://${{ vars.DOMAIN }}")
          test "$web" = "200" || { echo "web returned $web"; exit 1; }
          api=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ vars.DOMAIN }}/api/me")
          test "$api" = "401" || { echo "api /api/me returned $api"; exit 1; }

      # Supply-chain artifacts run after deploy so an attestation hiccup never
      # blocks a live release. Both are verifiable with `gh attestation verify`.
      - name: Generate api SBOM
        if: needs.changes.outputs.api == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/api:${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: api.sbom.spdx.json
          artifact-name: api-sbom.spdx.json
      - name: Attest api provenance
        if: needs.changes.outputs.api == 'true'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.REGISTRY }}/api
          subject-digest: ${{ steps.build_api.outputs.digest }}
      - name: Attest api SBOM
        if: needs.changes.outputs.api == 'true'
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-name: ${{ env.REGISTRY }}/api
          subject-digest: ${{ steps.build_api.outputs.digest }}
          sbom-path: api.sbom.spdx.json

      - name: Generate web SBOM
        if: needs.changes.outputs.web == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/web:${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: web.sbom.spdx.json
          artifact-name: web-sbom.spdx.json
      - name: Attest web provenance
        if: needs.changes.outputs.web == 'true'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.REGISTRY }}/web
          subject-digest: ${{ steps.build_web.outputs.digest }}
      - name: Attest web SBOM
        if: needs.changes.outputs.web == 'true'
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-name: ${{ env.REGISTRY }}/web
          subject-digest: ${{ steps.build_web.outputs.digest }}
          sbom-path: web.sbom.spdx.json
